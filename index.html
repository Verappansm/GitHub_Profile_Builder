<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Profile Builder</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
</head>

<body>
    <div class="app-container preview-hidden" id="app">
        <!-- Input Section -->
        <main class="sidebar">
            <!-- Top Header Bar -->
            <div class="top-header">
                <div class="header-left">
                    <div class="logo-section">
                        <h1>README Pro</h1>
                    </div>
                </div>
                <div class="header-right">
                    <div class="action-toolbar">
                        <button id="copyBtn" class="action-btn" title="Copy markdown (Ctrl+Shift+C)">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                            </svg>
                        </button>
                        <button id="downloadBtn" class="action-btn" title="Download README.md">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                        </button>
                        <button id="resetBtn" class="action-btn" title="Reset all fields">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M23 4v6h-6"></path>
                                <path d="M1 20v-6h6"></path>
                                <path d="M3.51 9a9 9 0 0114.85-3.36M20.49 15a9 9 0 01-14.85 3.36"></path>
                            </svg>
                        </button>
                        <button id="templatesBtn" class="action-btn" title="Load templates">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="7" height="7"></rect>
                                <rect x="14" y="3" width="7" height="7"></rect>
                                <rect x="14" y="14" width="7" height="7"></rect>
                                <rect x="3" y="14" width="7" height="7"></rect>
                            </svg>
                        </button>
                    </div>
                    <button type="button" id="toggleDarkMode" class="btn-toggle-dark" title="Toggle dark mode">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                    <button type="button" id="togglePreview" class="btn-toggle-preview">View Preview</button>
                </div>
            </div>

            <!-- Progress and Navigation Row -->
            <div class="info-row">
                <div class="progress-section">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <span class="progress-text" id="progressText">0% Complete</span>
                </div>
                <nav class="section-nav-inline">
                    <button class="nav-item-inline" data-section="about-section">👤 About</button>
                    <button class="nav-item-inline" data-section="work-section">💼 Work</button>
                    <button class="nav-item-inline" data-section="tech-section">🛠️ Tech</button>
                    <button class="nav-item-inline" data-section="github-section">📊 GitHub</button>
                    <button class="nav-item-inline" data-section="social-section">🌐 Social</button>
                </nav>
            </div>

            <form id="readmeForm">
                <section class="config-section" id="about-section">
                    <div class="section-header">
                        <h2>👤 About You</h2>
                        <button type="button" class="collapse-btn" aria-expanded="true">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </button>
                    </div>
                    <div class="section-content">
                        <div class="work-row">
                            <label class="work-label">👋 Name <span class="char-counter" id="name-counter">0 / 50</span></label>
                            <input type="text" id="name" placeholder="Verappan" maxlength="50">
                        </div>
                        <div class="work-row">
                            <label class="work-label">📝 Subtitle <span class="char-counter" id="tagline-counter">0 / 100</span></label>
                            <input type="text" id="tagline" placeholder="A passionate frontend developer from India" maxlength="100">
                        </div>
                        <div class="work-row">
                            <label class="work-label">📖 About Me <span class="char-counter" id="aboutme-counter">0 / 500</span></label>
                            <textarea id="aboutme" placeholder="Tell the world about yourself..." rows="4" maxlength="500"></textarea>
                        </div>
                    </div>
                </section>

                <section class="config-section" id="work-section">
                    <div class="section-header">
                        <h2>💼 Work & Experience</h2>
                        <button type="button" class="collapse-btn" aria-expanded="true">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </button>
                    </div>
                    <div class="section-content">
                        <div class="work-row">
                            <label class="work-label">🔭 I'm currently working on</label>
                            <div style="display: flex; gap: 1rem;">
                                <input type="text" id="work_project" placeholder="project name" style="flex: 1;">
                                <input type="url" id="work_link" placeholder="project link" style="flex: 1;">
                            </div>
                        </div>
                        <div class="work-row">
                            <label class="work-label">👯 I'm looking to collaborate on</label>
                            <div style="display: flex; gap: 1rem;">
                                <input type="text" id="collab_project" placeholder="project name" style="flex: 1;">
                                <input type="url" id="collab_link" placeholder="project link" style="flex: 1;">
                            </div>
                        </div>
                        <div class="work-row">
                            <label class="work-label">🤝 I'm looking for help with</label>
                            <div style="display: flex; gap: 1rem;">
                                <input type="text" id="help_project" placeholder="project name" style="flex: 1;">
                                <input type="url" id="help_link" placeholder="project link" style="flex: 1;">
                            </div>
                        </div>
                        <div class="work-row">
                            <label class="work-label">🌱 I'm currently learning</label>
                            <input type="text" id="learning" placeholder="Frameworks, courses etc.">
                        </div>
                        <div class="work-row">
                            <label class="work-label">💬 Ask me about</label>
                            <input type="text" id="askme" placeholder="react, vue and gsap">
                        </div>
                        <div class="work-row">
                            <label class="work-label">📫 How to reach me</label>
                            <input type="text" id="reachme" placeholder="example@gmail.com">
                        </div>
                        <div class="work-row">
                            <label class="work-label">👨‍💻 Projects available at</label>
                            <input type="url" id="projects_url" placeholder="portfolio link">
                        </div>
                        <div class="work-row">
                            <label class="work-label">📝 Regularly write articles on</label>
                            <input type="url" id="blog_url" placeholder="blog link">
                        </div>
                        <div class="work-row">
                            <label class="work-label">📄 Know about experiences</label>
                            <input type="url" id="resume_url" placeholder="resume link">
                        </div>
                        <div class="work-row">
                            <label class="work-label">⚡ Fun fact</label>
                            <input type="text" id="funfact" placeholder="I think I am funny">
                        </div>
                    </div>
                </section>

                <section class="config-section" id="tech-section">
                    <div class="section-header">
                        <h2>🛠️ Tech Stack</h2>
                        <button type="button" class="collapse-btn" aria-expanded="true">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </button>
                    </div>
                    <div class="section-content">
                        <div id="selectedTechBar" class="selected-tech-bar" style="display: none;">
                            <span class="selected-tech-label">Selected — drag to reorder:</span>
                            <div id="selectedTechList" class="selected-tech-list"></div>
                        </div>
                        <div class="search-container">
                            <span class="search-icon">🔍</span>
                            <input type="text" id="skillsSearch" placeholder="Search Skills">
                        </div>
                        <div id="techStackContainer">
                            <div class="tech-category">
                                <h3>Loading Tech Stack...</h3>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="config-section" id="github-section">
                    <div class="section-header">
                        <h2>📊 GitHub Dashboards</h2>
                        <button type="button" class="collapse-btn" aria-expanded="true">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </button>
                    </div>
                    <div class="section-content">
                        <div class="work-grid">
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                                <div class="work-row">
                                    <label class="work-label">GitHub Username</label>
                                    <input type="text" id="github" placeholder="Verappansm">
                                </div>
                                <div class="work-row">
                                    <label class="work-label">Stats Theme</label>
                                    <select id="theme">
                                        <option value="tokyonight">Tokyo Night</option>
                                        <option value="dark">Dark</option>
                                        <option value="radical">Radical</option>
                                        <option value="merko">Merko</option>
                                        <option value="gruvbox">Gruvbox</option>
                                    </select>
                                </div>
                            </div>
                            <div class="addons-list">
                                <label class="checkbox-item"><input type="checkbox" id="profile_stats" checked>
                                    <span>Profile Stats</span></label>
                                <label class="checkbox-item"><input type="checkbox" id="top_lang" checked> <span>Top
                                        Languages</span></label>
                                <label class="checkbox-item"><input type="checkbox" id="streak" checked> <span>Streak
                                        Stats</span></label>
                                <label class="checkbox-item"><input type="checkbox" id="addon_visitors"> <span>Visitors
                                        Count
                                        Badge</span></label>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="config-section" id="social-section">
                    <div class="section-header">
                        <h2>🌐 Connect with Socials</h2>
                        <button type="button" class="collapse-btn" aria-expanded="true">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </button>
                    </div>
                    <div class="section-content">
                        <div class="field-group">
                            <label>Social Icons Style</label>
                            <select id="socialStyle">
                                <option value="badges">Badges (Name + Logo)</option>
                                <option value="icons">Icons (Logo Only)</option>
                            </select>
                        </div>

                        <div class="social-grid">
                            <div class="social-row"><img src="https://cdn.simpleicons.org/x/333" alt="x"><input
                                    type="text" id="twitter" placeholder="twitter"></div>
                            <div class="social-row"><img
                                    src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/linkedin.svg"
                                    alt="linkedin"><input type="text" id="linkedin" placeholder="linkedin"></div>
                            <div class="social-row"><img src="https://cdn.simpleicons.org/instagram/333"
                                    alt="instagram"><input type="text" id="instagram" placeholder="instagram"></div>
                            <div class="social-row"><img src="https://cdn.simpleicons.org/stackoverflow/333"
                                    alt="stackoverflow"><input type="text" id="stackoverflow"
                                    placeholder="stackoverflow">
                            </div>
                            <div class="social-row"><img src="https://cdn.simpleicons.org/medium/333"
                                    alt="medium"><input type="text" id="medium" placeholder="medium"></div>
                            <div class="social-row"><img src="https://cdn.simpleicons.org/kaggle/333"
                                    alt="kaggle"><input type="text" id="kaggle" placeholder="kaggle"></div>
                            <div class="social-row"><img src="https://cdn.simpleicons.org/youtube/333"
                                    alt="youtube"><input type="text" id="youtube" placeholder="youtube"></div>
                            <div class="social-row"><img src="https://cdn.simpleicons.org/leetcode/333"
                                    alt="leetcode"><input type="text" id="leetcode" placeholder="leetcode"></div>
                            <div class="social-row"><img src="https://cdn.simpleicons.org/codechef/333"
                                    alt="codechef"><input type="text" id="codechef" placeholder="codechef"></div>
                            <div class="social-row"><img src="https://cdn.simpleicons.org/codeforces/333"
                                    alt="codeforces"><input type="text" id="codeforces" placeholder="codeforces"></div>
                            <div class="social-row"><img src="https://cdn.simpleicons.org/hackerrank/333"
                                    alt="hackerrank"><input type="text" id="hackerrank" placeholder="hackerrank"></div>
                            <div class="social-row"><img src="https://cdn.simpleicons.org/discord/333"
                                    alt="discord"><input type="text" id="discord" placeholder="discord"></div>
                            <div class="social-row"><img src="https://cdn.simpleicons.org/quora/333" alt="quora"><input
                                    type="text" id="quora" placeholder="quora"></div>
                        </div>
                </section>

                <!-- 
                <section class="config-section">
                    <h2>🚀 Auto-Deploy</h2>
                    <div class="work-row">
                        <label class="work-label">GitHub Personal Access Token (PAT)</label>
                        <input type="password" id="github_token" placeholder="ghp_xxxxxxxxxxxx">
                    </div>
                    <button type="button" id="deployBtn" class="btn-primary" style="width: 100%; margin-top: 1.5rem;">
                        🚢 Generate & Deploy to GitHub
                    </button>
                    <div id="deployStatus" style="margin-top: 1rem; font-size: 0.85rem; text-align: center;"></div>
                </section>
-->
            </form>
        </main>

        <!-- Templates Modal -->
        <div id="templatesModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Quick Templates</h3>
                    <button class="modal-close">&times;</button>
                </div>
                <div class="modal-body">
                    <button class="template-btn" data-template="frontend">
                        <span class="template-icon">💻</span>
                        <span class="template-name">Frontend Developer</span>
                    </button>
                    <button class="template-btn" data-template="fullstack">
                        <span class="template-icon">⚡</span>
                        <span class="template-name">Full Stack Developer</span>
                    </button>
                    <button class="template-btn" data-template="datascience">
                        <span class="template-icon">📊</span>
                        <span class="template-name">Data Scientist</span>
                    </button>
                    <button class="template-btn" data-template="devops">
                        <span class="template-icon">🏗️</span>
                        <span class="template-name">DevOps Engineer</span>
                    </button>
                    <button class="template-btn" data-template="designer">
                        <span class="template-icon">🎨</span>
                        <span class="template-name">UI/UX Designer</span>
                    </button>
                    <button class="template-btn" data-template="clear">
                        <span class="template-icon">✨</span>
                        <span class="template-name">Clear All</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="resizer" class="resizer" style="display: none;"></div>

        <!-- Preview Section -->
        <aside class="preview-area">
            <header class="preview-header">
                <div class="preview-tabs">
                    <div class="tab active" data-tab="preview">Live Preview</div>
                    <div class="tab" data-tab="code">Markdown Code</div>
                </div>
                <div class="actions">
                    <label class="split-toggle">
                        <input type="checkbox" id="splitView">
                        <span>Split View</span>
                    </label>
                </div>
            </header>

            <div class="preview-content">
                <div id="previewPane" class="markdown-body">
                </div>
                <div id="codePane" style="display: none;">
                    <pre><code id="markdownOutput"></code></pre>
                </div>
            </div>
        </aside>
    </div>

    <!-- Scroll to Top -->
    <button id="scrollTopBtn" class="scroll-top-btn" title="Back to top" style="display: none;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>

    <!-- Script Dependencies -->
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
